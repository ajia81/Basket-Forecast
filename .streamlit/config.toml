# 테마: 라이트 + 그린 (standalone 디자인 기준)
[theme]
base = "light"
primaryColor = "#1F8F4E"            # 그린(강조)
backgroundColor = "#F6F8F3"         # 라이트 세이지(본문 배경)
secondaryBackgroundColor = "#FFFFFF"  # 사이드바·위젯 표면
textColor = "#111E18"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
